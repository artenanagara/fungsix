<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; padding: 0; background: #111; color: white; font-family: sans-serif; height: 300vh; }
  .section { padding: 100px 80px; display: flex; gap: 80px; align-items: flex-start; }
  .left { position: sticky; top: 100px; width: 396px; }
  .right { flex: 1; display: flex; flex-direction: column; gap: 32px; padding-bottom: 50vh; }
  .card1 { width: 386px; background: #222; padding: 16px; position: sticky; top: -131px; z-index: 10; height: 350px;} 
  .card2 { width: 386px; background: #333; padding: 16px; position: sticky; top: 100px; z-index: 20; height: 200px; }
  .img { width: 100%; height: 200px; background: #444; margin-bottom: 16px; }
  .text { font-size: 24px; padding-top: 200px; } /* simulating bottom text */
</style>
</head>
<body>
  <div style="height: 50vh; background: #222;">Hero Section (Scroll down)</div>
  <div class="section">
    <div class="left">
      <h1>Left Column</h1>
      <p>This is sticky. It stays here.</p>
    </div>
    <div class="right">
      <div class="card1">
        <div class="img" style="position: absolute; top: 16px; left: 16px; right: 16px;"></div>
        <div class="text">Card 1 Text. (Image is at top)</div>
      </div>
      <div class="card2">
        <div class="text" style="padding-top: 0;">Card 2 text</div>
      </div>
    </div>
  </div>
</body>
</html>
